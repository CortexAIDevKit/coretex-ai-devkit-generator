name: Prompt Request

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
      issue_body:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      target_organization:
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  generate-prompt:
    runs-on: ubuntu-latest

    env:
      APP_ID: 3744672

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Parse issue body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/prompt-request.yml
          issue-body: ${{ inputs.issue_body }}

      - name: Resolve inputs
        id: inputs
        env:
          CONTEXT: ${{ steps.parse.outputs.issueparser_context }}
          ACTION: ${{ steps.parse.outputs.issueparser_action }}
          TARGET: ${{ steps.parse.outputs.issueparser_target }}
          PROMPT_MODE: ${{ steps.parse.outputs.issueparser_prompt_mode }}
          PROMPT_MODEL: ${{ steps.parse.outputs.issueparser_prompt_model }}
          PROMPT_DESCRIPTION: ${{ steps.parse.outputs.issueparser_prompt_description }}
          PROMPT_TOOLS: ${{ steps.parse.outputs.issueparser_prompt_tools }}
          PROMPT_AUTHORS: ${{ steps.parse.outputs.issueparser_prompt_authors }}
          TARGET_ORG: ${{ inputs.target_organization }}
        run: |
          set -euo pipefail

          CONTEXT_TRIM="$(echo "$CONTEXT" | xargs | tr '[:upper:]' '[:lower:]')"
          ACTION_TRIM="$(echo "$ACTION" | xargs | tr '[:upper:]' '[:lower:]')"
          TARGET_TRIM="$(echo "$TARGET" | xargs | tr '[:upper:]' '[:lower:]')"
          PROMPT_MODE_TRIM="$(echo "$PROMPT_MODE" | xargs | tr '[:upper:]' '[:lower:]')"
          PROMPT_MODEL_TRIM="$(echo "$PROMPT_MODEL" | xargs)"

          TARGET_ORG_TRIM="$(echo "${TARGET_ORG:-}" | xargs)"
          [ -z "$TARGET_ORG_TRIM" ] && \
            TARGET_ORG_TRIM="CortexAIDevKit"

          TOOLS_JSON="$(
            echo "$PROMPT_TOOLS" \
            | sed 's/^[[:space:]]*-[[:space:]]*//' \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -R . \
            | jq -s -c .
          )"

          AUTHORS_JSON="$(
            echo "$PROMPT_AUTHORS" \
            | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | grep -v '^$' \
            | jq -R . \
            | jq -s -c .
          )"

          {
            echo "context=$CONTEXT_TRIM"
            echo "action=$ACTION_TRIM"
            echo "target=$TARGET_TRIM"
            echo "prompt_mode=$PROMPT_MODE_TRIM"
            echo "prompt_model=$PROMPT_MODEL_TRIM"
            echo "prompt_description=$(echo "$PROMPT_DESCRIPTION" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g;s/^ //;s/ $//')"
            echo "prompt_tools=$TOOLS_JSON"
            echo "prompt_authors=$AUTHORS_JSON"
            echo "target_organization=$TARGET_ORG_TRIM"
            echo "project_name=${CONTEXT_TRIM}-${ACTION_TRIM}-${TARGET_TRIM}-prompt"
          } >> "$GITHUB_OUTPUT"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ env.APP_ID }}
          private-key: ${{ secrets.CORTEX_AI_DEVKIT_BOT_APP_PRIVATE_KEY }}
          owner: ${{ steps.inputs.outputs.target_organization }}

      - name: Preflight - Target repository must not already exist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project_name }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_REPO: ${{ inputs.source_repo }}
        run: .github/workflows/scripts/check-repo-available.sh "$TARGET_ORG" "$PROJECT_NAME"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install copier
        run: |
          pip install copier

      - name: Generate project with copier
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CONTEXT: ${{ steps.inputs.outputs.context }}
          ACTION: ${{ steps.inputs.outputs.action }}
          TARGET: ${{ steps.inputs.outputs.target }}
          PROMPT_MODE: ${{ steps.inputs.outputs.prompt_mode }}
          PROMPT_MODEL: ${{ steps.inputs.outputs.prompt_model }}
          PROMPT_DESCRIPTION: ${{ steps.inputs.outputs.prompt_description }}
          PROMPT_TOOLS: ${{ steps.inputs.outputs.prompt_tools }}
          PROMPT_AUTHORS: ${{ steps.inputs.outputs.prompt_authors }}
        run: |
          set -euo pipefail
          mkdir -p generated
          cd generated
          git config --global \
            url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

          copier copy \
            --defaults \
            --trust \
            -d "context=${CONTEXT}" \
            -d "action=${ACTION}" \
            -d "target=${TARGET}" \
            -d "prompt_mode=${PROMPT_MODE}" \
            -d "prompt_model=${PROMPT_MODEL}" \
            -d "prompt_description=${PROMPT_DESCRIPTION}" \
            -d "prompt_tools=${PROMPT_TOOLS}" \
            -d "prompt_authors=${PROMPT_AUTHORS}" \
            gh:CortexAIDevKit/template-github-copilot-prompts \
            "."

      - name: Create repository, commit and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project_name }}
          PROMPT_DESCRIPTION: ${{ steps.inputs.outputs.prompt_description }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          SOURCE_REPO: ${{ inputs.source_repo }}
        run: |
          set -euo pipefail

          REPO_FULL="${TARGET_ORG}/${PROJECT_NAME}"

          gh repo create "$REPO_FULL" \
            --public \
            --description "$PROMPT_DESCRIPTION"

          gh repo edit "$REPO_FULL" \
            --add-topic "copilot-prompt"

          .github/workflows/scripts/apply-repo-settings.sh \
            "$REPO_FULL"

          .github/workflows/scripts/apply-repo-rulesets.sh \
            "$REPO_FULL" \
            ".github/workflows/misc/ruleset-all-branches.json"

          .github/workflows/scripts/apply-repo-rulesets.sh \
            "$REPO_FULL" \
            ".github/workflows/misc/ruleset-main-branch.json"

          .github/workflows/scripts/rewrite-repo-labels.sh \
            "$REPO_FULL" \
            ".github/workflows/misc/labels.json"

          cd generated/${PROJECT_NAME}

          git init -b main

          git config user.name \
            "cortex-ai-devkit-bot[bot]"

          git config user.email \
            "cortex-ai-devkit-bot[bot]@users.noreply.github.com"

          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git"

          git add .

          git commit -m \
            "chore: scaffold ${PROJECT_NAME} from copilot-prompt-template (closes ${SOURCE_REPO}#${ISSUE_NUMBER})"

          git push -u origin main

      - name: Comment on issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          GH_REPO: ${{ inputs.source_repo }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          PROJECT_NAME: ${{ steps.inputs.outputs.project_name }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GH_REPO" \
            --body \
            "✅ Prompt scaffolded successfully:

            https://github.com/${TARGET_ORG}/${PROJECT_NAME}"
