name: Skill Request

on:
  issues:
    types: [opened, labeled, reopened]

permissions:
  issues: write
  contents: read

jobs:
  generate-skill:
    if: contains(github.event.issue.labels.*.name, 'skill-request')
    runs-on: ubuntu-latest

    steps:
      - name: Parse issue body
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/skill-request.yml

      - name: Resolve inputs
        id: inputs
        env:
          DOMAIN: ${{ steps.parse.outputs.issueparser_domain }}
          ACTION: ${{ steps.parse.outputs.issueparser_action }}
          SKILL_NAME: ${{ steps.parse.outputs.issueparser_skill_name }}
          SKILL_DESCRIPTION: ${{ steps.parse.outputs.issueparser_skill_description }}
          SKILL_TOOLS: ${{ steps.parse.outputs.issueparser_skill_tools }}
          SKILL_AUTHORS: ${{ steps.parse.outputs.issueparser_skill_authors }}
          TARGET_ORG: ${{ steps.parse.outputs.issueparser_target_organization }}
        run: |
          set -euo pipefail
          DOMAIN_TRIM="$(echo "$DOMAIN" | xargs)"
          ACTION_TRIM="$(echo "$ACTION" | xargs)"
          SKILL_NAME_TRIM="$(echo "${SKILL_NAME:-}" | xargs)"
          [ -z "$SKILL_NAME_TRIM" ] && SKILL_NAME_TRIM="${DOMAIN_TRIM}-${ACTION_TRIM}"
          TARGET_ORG_TRIM="$(echo "${TARGET_ORG:-}" | xargs)"
          [ -z "$TARGET_ORG_TRIM" ] && TARGET_ORG_TRIM="CortexAIDevKit"

          # Convert tools markdown list ("- codebase\n- search") to JSON array string
          TOOLS_JSON="$(echo "$SKILL_TOOLS" | sed 's/^[[:space:]]*-[[:space:]]*//' | grep -v '^$' | jq -R . | jq -s -c .)"
          # Convert authors "Ada, Grace" to JSON array
          AUTHORS_JSON="$(echo "$SKILL_AUTHORS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R . | jq -s -c .)"

          {
            echo "domain=$DOMAIN_TRIM"
            echo "action=$ACTION_TRIM"
            echo "skill_name=$SKILL_NAME_TRIM"
            echo "skill_description=$(echo "$SKILL_DESCRIPTION" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g;s/^ //;s/ $//')"
            echo "skill_tools=$TOOLS_JSON"
            echo "skill_authors=$AUTHORS_JSON"
            echo "target_organization=$TARGET_ORG_TRIM"
            echo "project_dir=${DOMAIN_TRIM}-${ACTION_TRIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: 3744672
          private-key: ${{ secrets.CORTEX_AI_DEVKIT_BOT_APP_PRIVATE_KEY }}
          owner: ${{ steps.inputs.outputs.target_organization }}

      - name: Preflight - verify GitHub App installation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /tmp/installation.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${TARGET_ORG}/installation" || true)
          if [ "$STATUS" != "200" ]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body \
              "Preflight failed: GitHub App \`cortex-ai-devkit-bot\` (app id 3744672) is not installed on organization \`${TARGET_ORG}\`. Please install it and retry."
            echo "App not installed on $TARGET_ORG (HTTP $STATUS)"
            exit 1
          fi
          echo "App is installed on $TARGET_ORG"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install copier
        run: pip install copier

      - name: Generate project with copier
        env:
          DOMAIN: ${{ steps.inputs.outputs.domain }}
          ACTION: ${{ steps.inputs.outputs.action }}
          SKILL_NAME: ${{ steps.inputs.outputs.skill_name }}
          SKILL_DESCRIPTION: ${{ steps.inputs.outputs.skill_description }}
          SKILL_TOOLS: ${{ steps.inputs.outputs.skill_tools }}
          SKILL_AUTHORS: ${{ steps.inputs.outputs.skill_authors }}
          PROJECT_DIR: ${{ steps.inputs.outputs.project_dir }}
        run: |
          set -euo pipefail
          copier copy --defaults --trust \
            -d "domain=${DOMAIN}" \
            -d "action=${ACTION}" \
            -d "skill_name=${SKILL_NAME}" \
            -d "skill_description=${SKILL_DESCRIPTION}" \
            -d "skill_tools=${SKILL_TOOLS}" \
            -d "skill_authors=${SKILL_AUTHORS}" \
            gh:CortexAIDevKit/copilot-skill-template \
            "${PROJECT_DIR}"

      - name: Create repository, commit and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          PROJECT_DIR: ${{ steps.inputs.outputs.project_dir }}
          SKILL_DESCRIPTION: ${{ steps.inputs.outputs.skill_description }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPO_FULL="${TARGET_ORG}/${PROJECT_DIR}"

          gh repo create "$REPO_FULL" --private --description "$SKILL_DESCRIPTION" || true

          cd "$PROJECT_DIR"
          git init -b main
          git config user.name  "cortex-ai-devkit-bot[bot]"
          git config user.email "cortex-ai-devkit-bot[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO_FULL}.git"
          git add .
          git commit -m "chore: scaffold ${PROJECT_DIR} from copilot-skill-template (closes ${SOURCE_REPO}#${ISSUE_NUMBER})"
          git push -u origin main

      - name: Comment on issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_REPO: ${{ github.repository }}
          TARGET_ORG: ${{ steps.inputs.outputs.target_organization }}
          PROJECT_DIR: ${{ steps.inputs.outputs.project_dir }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body \
            "Skill scaffolded at https://github.com/${TARGET_ORG}/${PROJECT_DIR}"
