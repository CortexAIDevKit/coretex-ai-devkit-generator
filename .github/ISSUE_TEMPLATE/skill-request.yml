name: Skill request
description: Request creation of a new skill using the generator inputs from copier.yml
title: "skill: <context>-<action>-<target>"
labels:
  - skill-request
body:
  - type: markdown
    attributes:
      value: |
        Fill out the fields below. These match the generator inputs defined in copier.yml.

  - type: input
    id: context
    attributes:
      label: Context
      description: Area, tech, or stage the skill applies to (e.g. maven, ci, repo, git, docs, test, security, api, angular)
      placeholder: ci
    validations:
      required: true

  - type: input
    id: action
    attributes:
      label: Action
      description: Imperative verb describing what the skill does (e.g. fix, generate, upgrade, debug, validate, create, scaffold)
      placeholder: generate
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target
      description: Concrete artifact or problem acted on (e.g. readme, workflow, dependencies, release-branch, unit-tests)
      placeholder: workflow
    validations:
      required: true

  - type: textarea
    id: skill_description
    attributes:
      label: Skill description
      description: One-line description of what this skill does
      placeholder: Generates sample documentation from project inputs.
    validations:
      required: true

  - type: dropdown
    id: skill_tools
    attributes:
      label: Skill tools
      description: Tools the skill may use (select all that apply)
      multiple: true
      options:
        - codebase
        - search
        - searchResults
        - usages
        - editFiles
        - new
        - fetch
        - githubRepo
        - openSimpleBrowser
        - runCommands
        - terminalLastCommand
        - terminalSelection
        - runTasks
        - runTests
        - testFailure
        - findTestFiles
        - runNotebooks
        - problems
        - vscodeAPI
    validations:
      required: true

  - type: input
    id: skill_authors
    attributes:
      label: Skill authors
      description: Comma-separated author names
      placeholder: Ada, Grace, Linus
    validations:
      required: true

  - type: input
    id: target_organization
    attributes:
      label: Target Github organization
      description: The target Github organization where the skill repository will be created.
      placeholder: CortexAIDevKit
    validations:
      required: true
